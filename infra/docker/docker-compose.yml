services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:0.5.7
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://appuser:apppass@postgres:5432/ragdb
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      FILE_STORAGE_PATH: /data/storage
    ports:
      - "8000:8000"
    volumes:
      - ../../storage:/data/storage
      - ../../apps/api:/app/apps/api
    depends_on:
      - postgres
      - redis
      - qdrant
      - ollama

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../../.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://appuser:apppass@postgres:5432/ragdb
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      FILE_STORAGE_PATH: /data/storage
    volumes:
      - ../../storage:/data/storage
      - ../../apps/api:/app/apps/api
      - ../../apps/worker:/app/apps/worker
    depends_on:
      - redis
      - postgres
      - qdrant

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  qdrant_data:
  minio_data:
  ollama_data:
